services:
  mongodb:
    image: mongo:7
    container_name: chat_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: chatpass123
      MONGO_INITDB_DATABASE: chatdb
    volumes:
      - mongo_data:/data/db
    networks:
      - chat_network

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - chat_network

  backend:
    build: ./backend
    container_name: chat_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:chatpass123@mongodb:27017/chatdb?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_this_to_a_long_random_secret_string_in_production
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost
    depends_on:
      - mongodb
      - redis
    networks:
      - chat_network

  frontend:
    build: ./frontend
    container_name: chat_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - chat_network

  nginx:
    image: nginx:alpine
    container_name: chat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - chat_network

volumes:
  mongo_data:
  redis_data:

networks:
  chat_network:
    driver: bridge
